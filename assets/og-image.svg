<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background stack -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Eyebrow label -->
  <text x="80" y="118"
        fill="#F59E0B"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="22" letter-spacing="6">
    AGENT IDENTITY REGISTRY
  </text>

  <!-- AIR wordmark -->
  <text x="74" y="340"
        fill="#FFFFFF"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="240" letter-spacing="-10">
    AIR
  </text>

  <!-- Tagline -->
  <text x="80" y="430"
        fill="rgba(255,255,255,0.94)"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="42">
    The global identity standard
  </text>
  <text x="80" y="484"
        fill="rgba(255,255,255,0.94)"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="42">
    for AI agents.
  </text>

  <!-- Bottom URL -->
  <text x="80" y="575"
        fill="rgba(255,255,255,0.55)"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-weight="500" font-size="22">
    agentidentityregistry.org
  </text>

  <!-- Right-side decorative identity graph -->
  <g transform="translate(820, 165)">
    <!-- outer orbit -->
    <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="3 6"/>
    <!-- mid orbit -->
    <circle cx="160" cy="160" r="100" fill="none" stroke="rgba(245,158,11,0.25)" stroke-width="1.5"/>

    <!-- core hex node -->
    <circle cx="160" cy="160" r="62" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.85)" stroke-width="2.5"/>
    <circle cx="160" cy="160" r="36" fill="rgba(245,158,11,0.22)" stroke="rgba(245,158,11,1)" stroke-width="1.5"/>
    <text x="160" y="172" text-anchor="middle"
          fill="#FCD34D"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-weight="700" font-size="24">ID</text>

    <!-- orbit satellites -->
    <circle cx="30" cy="60"  r="11" fill="#FFFFFF" fill-opacity="0.85"/>
    <circle cx="280" cy="40" r="9"  fill="#FFFFFF" fill-opacity="0.7"/>
    <circle cx="20" cy="240" r="13" fill="#FFFFFF" fill-opacity="0.9"/>
    <circle cx="290" cy="250" r="10" fill="#FFFFFF" fill-opacity="0.75"/>
    <circle cx="160" cy="-20" r="7" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="160" cy="320" r="8" fill="#FFFFFF" fill-opacity="0.65"/>

    <!-- connection lines -->
    <g stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
      <line x1="160" y1="160" x2="30"  y2="60"/>
      <line x1="160" y1="160" x2="280" y2="40"/>
      <line x1="160" y1="160" x2="20"  y2="240"/>
      <line x1="160" y1="160" x2="290" y2="250"/>
      <line x1="160" y1="160" x2="160" y2="-20"/>
      <line x1="160" y1="160" x2="160" y2="320"/>
    </g>
  </g>
</svg>
